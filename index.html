<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Finanças - Modo Conforto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #121214;
            color: #c4c6d0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Área de Digitação e Inputs (Fundo Escuro Suave) */
        .input-area {
            background: #1e1e22;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
            width: 100%;
            border: 1px solid #2a2a30;
        }

        .row-inputs {
            display: grid;
            grid-template-columns: 2fr 1.2fr 0.8fr 1.2fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-titulo, .input-valor, .input-parcelas, .input-busca, .input-data-principal {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #3a3a42;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
            background: #26262b;
        }

        .input-valor, .input-parcelas {
            text-align: center;
        }

        /* Ajuste do calendário nativo para modo escuro em alguns navegadores */
        .input-data-principal::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .input-titulo:focus, .input-valor:focus, .input-parcelas:focus, .input-busca:focus, .input-data-principal:focus {
            border-color: #10b981;
            background: #2a2a32;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        /* Barra de Pesquisa */
        .busca-container {
            margin-bottom: 25px;
            width: 100%;
        }

        .input-busca {
            background: #1e1e22;
            border: 1px solid #2a2a30;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .input-busca:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        textarea {
            width: 100%;
            height: 110px;
            padding: 14px;
            border: 1px solid #3a3a42;
            border-radius: 10px;
            resize: vertical;
            font-size: 0.95rem;
            margin-bottom: 15px;
            outline: none;
            transition: all 0.2s;
            background: #26262b;
            color: #f1f5f9;
        }

        textarea:focus {
            border-color: #10b981;
            background: #2a2a32;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        button {
            border: none;
            padding: 14px 24px;
            font-size: 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-salvar {
            background: #10b981;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-salvar:hover { 
            background: #34d399;
            transform: translateY(-1px);
        }

        .btn-voz {
            background: #26262b;
            color: #94a3b8;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            padding: 0;
            border: 1px solid #3a3a42;
        }
        
        .btn-voz:hover {
            background: #2a2a32;
            color: #f1f5f9;
        }

        .btn-voz.escutando {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status-voz {
            font-size: 0.85rem;
            color: #fca5a5;
            text-align: center;
            margin-bottom: 12px;
            font-weight: 600;
            display: none;
            background: #7f1d1d;
            padding: 8px;
            border-radius: 8px;
        }

        /* Cards de Cobrança Muted */
        .notas-lista {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .nota-card {
            background: #1e1e22;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-top: 4px solid #f59e0b; 
            border-left: 1px solid #2a2a30;
            border-right: 1px solid #2a2a30;
            border-bottom: 1px solid #2a2a30;
            animation: surgir 0.3s ease-out;
            transition: all 0.2s ease;
            width: 100%;
        }

        .nota-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .nota-card.parcial { border-top-color: #38bdf8; }
        .nota-card.pago { border-top-color: #10b981; }

        @keyframes surgir {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nota-header-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .nota-titulo-exibicao {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        /* Badges de Status Confortáveis */
        .badge-status {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pendente { background: #451a03; color: #fef3c7; }
        .status-parcial { background: #0c4a6e; color: #e0f2fe; }
        .status-pago { background: #064e3b; color: #d1fae5; }

        .nota-texto {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #94a3b8;
        }

        /* Containers de Parcelas */
        .parcelas-container {
            background: #17171c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #26262b;
        }

        .parcela-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            background: #202024;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2d2d34;
            transition: all 0.2s;
        }

        .parcela-item input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #10b981;
        }

        .parcela-item .parcela-label {
            font-weight: 600;
            color: #cbd5e1;
            min-width: 55px;
        }

        .parcela-item .parcela-data-exibicao {
            font-size: 0.8rem;
            color: #94a3b8;
            background: #2a2a32;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .parcela-item .valor-parcela-display {
            margin-left: auto;
            font-weight: 700;
            color: #e2e8f0;
            font-size: 0.95rem;
            margin-right: 5px;
        }

        .btn-editar-parcela {
            background: #2a2a32;
            color: #94a3b8;
            border: 1px solid #3a3a42;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .btn-editar-parcela:hover {
            background: #3a3a42;
            color: #f1f5f9;
        }

        .btn-apagar-parcela {
            background: #451a03;
            color: #fca5a5;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .btn-apagar-parcela:hover {
            background: #7c2d12;
        }

        .btn-adicionar-parcela-card {
            background: #202024;
            color: #94a3b8;
            border: 1px dashed #3a3a42;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-adicionar-parcela-card:hover {
            background: #2a2a32;
            color: #f1f5f9;
            border-color: #4b5563;
        }

        .parcela-item.editando {
            background: #064e3b;
            border-color: #10b981;
        }

        .parcela-item .input-edicao-parcela {
            width: 85px;
            padding: 4px 8px;
            border: 2px solid #10b981;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
            margin-left: auto;
            font-weight: 600;
            outline: none;
            background: #17171c;
            color: #fff;
            margin-right: 5px;
        }

        .btn-confirmar-edicao {
            background: #10b981;
            color: #0f172a;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 3px;
        }

        .btn-cancelar-edicao {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .nota-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid #26262b;
            padding-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .botoes-card {
            display: flex;
            gap: 8px;
        }

        .btn-card {
            background: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn-zap { color: #4ade80; border: 1px solid #22c55e; background: rgba(34, 197, 94, 0.1); }
        .btn-zap:hover { background: #22c55e; color: #0f172a; }

        .btn-editar { color: #60a5fa; border: 1px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .btn-editar:hover { background: #3b82f6; color: #0f172a; }

        .btn-excluir { color: #f87171; border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
        .btn-excluir:hover { background: #ef4444; color: white; }

        .dica-comando {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            margin-top: 10px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .row-inputs {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>💼 Minhas Finanças</h1>
        </header>

        <div class="input-area">
            <div id="statusVoz" class="status-voz">🎙️ Ouvindo... Fale agora.</div>
            
            <div class="row-inputs">
                <input type="text" id="notaTitulo" class="input-titulo" placeholder="Cliente ou Serviço...">
                <input type="number" id="notaValor" class="input-valor" min="0" step="0.01" placeholder="Valor R$" oninput="calcularParcelasAutomatico()">
                <input type="number" id="notaParcelas" class="input-parcelas" min="1" value="1" placeholder="Parc." oninput="calcularParcelasAutomatico()">
                <input type="date" id="notaData" class="input-data-principal" title="Data Inicial da Cobrança">
            </div>
            
            <textarea id="notaTexto" placeholder="Os detalhes do parcelamento aparecerão aqui automaticamente conforme você digita o valor..."></textarea>
            
            <div class="action-buttons">
                <button onclick="salvarNota()" class="btn-salvar" id="btnSalvarPrincipal">💾 Registrar Cobrança</button>
                <button onclick="alternarVoz()" class="btn-voz" id="btnVoz" title="Ativar Voz">🎙️</button>
            </div>
            <div class="dica-comando">Dica de voz: fale <b>"salvar anotação"</b> ou <b>"limpar tudo"</b>.</div>
        </div>

        <div class="busca-container">
            <input type="text" id="inputBusca" class="input-busca" placeholder="🔍 Pesquisar por cliente ou detalhes da conta..." oninput="filtrarCobranças()">
        </div>

        <div id="notasContainer" class="notas-lista"></div>
    </div>

    <script>
        // --- FUNÇÃO DE CÁLCULO AUTOMÁTICO ---
        function calcularParcelasAutomatico() {
            if (window.idEdicaoAtual !== null) return;

            const valorTotal = parseFloat(document.getElementById("notaValor").value) || 0;
            const qtdParcelas = parseInt(document.getElementById("notaParcelas").value) || 1;
            const campoTexto = document.getElementById("notaTexto");

            if (valorTotal <= 0) {
                campoTexto.value = "";
                return;
            }

            const valorParcela = (valorTotal / qtdParcelas).toFixed(2);
            
            if (qtdParcelas === 1) {
                campoTexto.value = `Pagamento à vista no valor de R$ ${valorTotal.toFixed(2)}.`;
            } else {
                campoTexto.value = `Valor Total: R$ ${valorTotal.toFixed(2)}\nParcelado em ${qtdParcelas}x de R$ ${valorParcela} cada parcela.`;
            }
        }

        // Definir data de hoje por padrão ao iniciar o app
        document.getElementById('notaData').valueAsDate = new Date();

        // --- BANCO DE DADOS INDEXEDDB ---
        let db;
        window.idEdicaoAtual = null;

        const request = indexedDB.open("BancoCobrancasCalculadas", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("cobrancas", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            renderizarNotas();
        };

        request.onerror = function() {
            alert("Erro ao abrir o banco de dados.");
        };

        // --- SISTEMA DE RECONHECIMENTO DE VOZ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconhecimento = null;
        let escutando = false;

        if (SpeechRecognition) {
            reconhecimento = new SpeechRecognition();
            reconhecimento.continuous = true; 
            reconhecimento.lang = 'pt-BR';

            reconhecimento.onresult = function(event) {
                const resultadoAtual = event.results[event.results.length - 1][0].transcript.trim();
                const resultadoMinusculo = resultadoAtual.toLowerCase();
                const campoTexto = document.getElementById("notaTexto");

                if (resultadoMinusculo === "salvar anotação" || resultadoMinusculo === "salvar nota") {
                    salvarNota();
                    pararVoz();
                    return;
                }
                
                if (resultadoMinusculo === "limpar tudo" || resultadoMinusculo === "apagar tudo") {
                    limparFormulario();
                    return;
                }

                if (campoTexto.value !== "") {
                    campoTexto.value += " " + resultadoAtual;
                } else {
                    campoTexto.value = resultadoAtual;
                }
            };

            reconhecimento.onend = function() {
                if (escutando) reconhecimento.start(); 
            };
        }

        function alternarVoz() {
            if (!SpeechRecognition) { alert("Voz não suportada."); return; }
            if (!escutando) {
                reconhecimento.start();
                escutando = true;
                document.getElementById("btnVoz").classList.add("escutando");
                document.getElementById("statusVoz").style.display = "block";
            } else {
                pararVoz();
            }
        }

        function pararVoz() {
            if (reconhecimento) {
                escutando = false;
                reconhecimento.stop();
                document.getElementById("btnVoz").classList.remove("escutando");
                document.getElementById("statusVoz").style.display = "none";
            }
        }

        function limparFormulario() {
            document.getElementById("notaTitulo").value = "";
            document.getElementById("notaValor").value = "";
            document.getElementById("notaParcelas").value = "1";
            document.getElementById("notaTexto").value = "";
            document.getElementById('notaData').valueAsDate = new Date();
            window.idEdicaoAtual = null;
            document.getElementById("btnSalvarPrincipal").innerHTML = "💾 Registrar Cobrança";
        }

        // --- GERADOR DE DATAS CONSECUTIVAS ---
        function gerarListaDeDatas(dataInicialStr, totalParcelas) {
            const lista = [];
            if (!dataInicialStr) return Array(totalParcelas).fill("");
            
            for (let i = 0; i < totalParcelas; i++) {
                const dataBase = new Date(dataInicialStr + "T00:00:00");
                dataBase.setMonth(dataBase.getMonth() + i);
                
                const dia = String(dataBase.getDate()).padStart(2, '0');
                const mes = String(dataBase.getMonth() + 1).padStart(2, '0');
                const ano = dataBase.getFullYear();
                
                lista.push(`${dia}/${mes}/${ano}`);
            }
            return lista;
        }

        // --- OPERAÇÕES CRUD ---

        font = function salvarNota() {
            const campoTitulo = document.getElementById("notaTitulo");
            const campoValor = document.getElementById("notaValor");
            const campoParcelas = document.getElementById("notaParcelas");
            const campoTexto = document.getElementById("notaTexto");
            const campoData = document.getElementById("notaData");
            
            const titulo = campoTitulo.value.trim();
            const valor = parseFloat(campoValor.value) || 0;
            const qtdParcelas = parseInt(campoParcelas.value) || 1;
            const texto = campoTexto.value.trim();
            
            let dataFormatada = "";
            if (campoData.value) {
                const partes = campoData.value.split("-");
                dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
            }

            if (titulo === "" || texto === "") {
                alert("Preencha o cliente e os dados antes de salvar!");
                return;
            }

            const transacao = db.transaction(["cobrancas"], "readwrite");
            const store = transacao.objectStore("cobrancas");

            if (window.idEdicaoAtual !== null) {
                const pedidoObter = store.get(window.idEdicaoAtual);
                pedidoObter.onsuccess = function() {
                    const cobranca = pedidoObter.result;
                    cobranca.titulo = titulo;
                    cobranca.valor = valor;
                    cobranca.texto = texto;
                    cobranca.dataConta = dataFormatada; 
                    cobranca.dataRaw = campoData.value;
                    
                    cobranca.datasFuturas = gerarListaDeDatas(campoData.value, qtdParcelas);

                    if (cobranca.historicoParcelas.length !== qtdParcelas) {
                        const novasParcelas = Array(qtdParcelas).fill(false);
                        for (let i = 0; i < Math.min(cobranca.historicoParcelas.length, qtdParcelas); i++) {
                            novasParcelas[i] = cobranca.historicoParcelas[i];
                        }
                        cobranca.historicoParcelas = novasParcelas;
                    }
                    
                    if (!cobranca.valoresParcelas || cobranca.valoresParcelas.length !== qtdParcelas) {
                        const novosValores = Array(qtdParcelas).fill(valor / qtdParcelas);
                        for (let i = 0; i < Math.min((cobranca.valoresParcelas || []).length, qtdParcelas); i++) {
                            novosValores[i] = cobranca.valoresParcelas[i];
                        }
                        cobranca.valoresParcelas = novosValores;
                    }
                    
                    store.put(cobranca);
                };
            } else {
                const listaParcelas = Array(qtdParcelas).fill(false);
                const valorPadraoParcela = valor / qtdParcelas;
                const valoresParcelas = Array(qtdParcelas).fill(valorPadraoParcela);
                const datasFuturas = gerarListaDeDatas(campoData.value, qtdParcelas);
                
                const agora = new Date();
                const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                const novaCobranca = { 
                    titulo: titulo, 
                    valor: valor,
                    texto: texto, 
                    dataConta: dataFormatada, 
                    dataRaw: campoData.value,
                    dataHora: "Registrado às " + horaFormatada,
                    historicoParcelas: listaParcelas,
                    valoresParcelas: valoresParcelas,
                    datasFuturas: datasFuturas
                };
                store.add(novaCobranca);
            }

            transacao.oncomplete = function() {
                limparFormulario();
                renderizarNotas();
            };
        }

        function renderizarNotas() {
            const container = document.getElementById("notasContainer");
            container.innerHTML = "";

            const tx = db.transaction("cobrancas", "readonly");
            const store = tx.objectStore("cobrancas");
            const cursorRequest = store.openCursor(null, "prev"); 

            let temCobrancas = false;

            cursorRequest.onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    temCobrancas = true;
                    const cobranca = cursor.value;

                    const totalParcelas = cobranca.historicoParcelas.length;
                    const pagas = cobranca.historicoParcelas.filter(p => p === true).length;
                    
                    if (!cobranca.valoresParcelas) {
                        cobranca.valoresParcelas = Array(totalParcelas).fill(cobranca.valor / totalParcelas);
                    }
                    if (!cobranca.datasFuturas) {
                        cobranca.datasFuturas = gerarListaDeDatas(cobranca.dataRaw, totalParcelas);
                    }

                    let classeCard = "";
                    let badgeHTML = "";

                    if (pagas === 0) {
                        classeCard = "";
                        badgeHTML = `<span class="badge-status status-pendente">🔴 Pendente</span>`;
                    } else if (pagas < totalParcelas) {
                        classeCard = "parcial";
                        badgeHTML = `<span class="badge-status status-parcial">🟡 Parcial (${pagas}/${totalParcelas})</span>`;
                    } else {
                        classeCard = "pago";
                        badgeHTML = `<span class="badge-status status-pago">🟢 PAGO</span>`;
                    }

                    const card = document.createElement("div");
                    card.className = `nota-card ${classeCard}`;
                    
                    const headerHTML = `
                        <div class="nota-header-card">
                            <div class="nota-titulo-exibicao">${escapeHTML(cobranca.titulo)}</div>
                            ${badgeHTML}
                        </div>
                        <div class="nota-texto">${escapeHTML(cobranca.texto)}</div>
                    `;
                    
                    card.innerHTML = headerHTML;

                    // Botão para adicionar mais parcelas diretamente no Card
                    const btnAddParcela = document.createElement("button");
                    btnAddParcela.className = "btn-adicionar-parcela-card";
                    btnAddParcela.innerHTML = "➕ Adicionar Parcela";
                    btnAddParcela.onclick = function() { adicionarNovaParcelaInterna(cobranca.id); };
                    card.appendChild(btnAddParcela);
                    
                    const parcelasContainer = document.createElement("div");
                    parcelasContainer.className = "parcelas-container";
                    
                    for (let i = 0; i < totalParcelas; i++) {
                        const parcelaDiv = document.createElement("div");
                        parcelaDiv.className = "parcela-item";
                        parcelaDiv.id = `parcela-${cobranca.id}-${i}`;
                        
                        const valorParcela = cobranca.valoresParcelas[i].toFixed(2);
                        const checado = cobranca.historicoParcelas[i] ? "checked" : "";
                        const dataVencimento = cobranca.datasFuturas[i] || "--/--/----";
                        
                        parcelaDiv.innerHTML = `
                            <input type="checkbox" ${checado} onchange="alternarParcela(${cobranca.id}, ${i}, this.checked)">
                            <span class="parcela-label">Parc. ${i + 1}</span>
                            <span class="parcela-data-exibicao">📅 ${dataVencimento}</span>
                            <span class="valor-parcela-display">R$ ${valorParcela}</span>
                            <button class="btn-editar-parcela" onclick="iniciarEdicaoParcela(${cobranca.id}, ${i})">✏️</button>
                            <button class="btn-apagar-parcela" onclick="apagarParcelaInterna(${cobranca.id}, ${i})" title="Apagar Parcela">🗑️</button>
                        `;
                        
                        parcelasContainer.appendChild(parcelaDiv);
                    }
                    
                    card.appendChild(parcelasContainer);
                    
                    const exibicaoData = cobranca.dataConta ? `📅 Início: ${cobranca.dataConta} | ` : "📅 ";
                    
                    const footerHTML = `
                        <div class="nota-footer">
                            <span>${exibicaoData}${cobranca.dataHora}</span>
                            <div class="botoes-card">
                                <button class="btn-card btn-zap" onclick="compartilharWhatsAppPorID(${cobranca.id})">🟢 Zap</button>
                                <button class="btn-card btn-editar" onclick="prepararEdicaoPorID(${cobranca.id})">✏️ Editar</button>
                                <button class="btn-card btn-excluir" onclick="excluirNota(${cobranca.id})">🗑️ Excluir</button>
                            </div>
                        </div>
                    `;
                    
                    card.insertAdjacentHTML('beforeend', footerHTML);
                    container.appendChild(card);
                    cursor.continue();
                } else if (!temCobrancas) {
                    container.innerHTML = `<p style="text-align: center; color: #94a3b8; font-size: 1.1rem;">Nenhuma cobrança registrada.</p>`;
                }
            };
            
            setTimeout(filtrarCobranças, 50);
        }

        function filtrarCobranças() {
            const termoBusca = document.getElementById("inputBusca").value.toLowerCase().trim();
            const cards = document.getElementsByClassName("nota-card");

            for (let card of cards) {
                const titulo = card.querySelector(".nota-titulo-exibicao").textContent.toLowerCase();
                const texto = card.querySelector(".nota-texto").textContent.toLowerCase();

                if (titulo.includes(termoBusca) || texto.includes(termoBusca)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            }
        }

        // --- ADICIONAR MAIS PARCELAS POR DENTRO DO CARD ---
        function adicionarNovaParcelaInterna(idCobranca) {
            const tx = db.transaction(["cobrancas"], "readwrite");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (!cobranca) return;

                const totalAtual = cobranca.valoresParcelas.length;
                const valorSugerido = totalAtual > 0 ? (cobranca.valor / totalAtual) : 0;

                cobranca.historicoParcelas.push(false);
                cobranca.valoresParcelas.push(valorSugerido);
                
                if (cobranca.dataRaw) {
                    const novaListaDatas = gerarListaDeDatas(cobranca.dataRaw, totalAtual + 1);
                    cobranca.datasFuturas.push(novaListaDatas[totalAtual]);
                } else {
                    cobranca.datasFuturas.push("");
                }

                recalcularTextoDivida(cobranca);
                store.put(cobranca);
            };

            tx.oncomplete = function() {
                renderizarNotas();
            };
        }

        // --- APAGAR PARCELA ESPECÍFICA ---
        function apagarParcelaInterna(idCobranca, indiceParcela) {
            if (!confirm("Deseja remover esta parcela? O saldo devedor será recalculado.")) return;

            const tx = db.transaction(["cobrancas"], "readwrite");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (!cobranca) return;

                cobranca.historicoParcelas.splice(indiceParcela, 1);
                cobranca.valoresParcelas.splice(indiceParcela, 1);
                if (cobranca.datasFuturas) cobranca.datasFuturas.splice(indiceParcela, 1);

                recalcularTextoDivida(cobranca);
                store.put(cobranca);
            };

            tx.oncomplete = function() {
                renderizarNotas();
            };
        }

        function iniciarEdicaoParcela(idCobranca, indiceParcela) {
            const parcelaDiv = document.getElementById(`parcela-${idCobranca}-${indiceParcela}`);
            if (!parcelaDiv) return;

            const tx = db.transaction(["cobrancas"], "readonly");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (!cobranca) return;
                
                const valorAtual = cobranca.valoresParcelas[indiceParcela].toFixed(2);
                const estaChecado = cobranca.historicoParcelas[indiceParcela] ? "checked" : "";

                parcelaDiv.classList.add("editando");
                parcelaDiv.innerHTML = `
                    <input type="checkbox" ${estaChecado} disabled>
                    <span class="parcela-label">Parc. ${indiceParcela + 1}</span>
                    <input type="number" class="input-edicao-parcela" value="${valorAtual}" step="0.01" min="0.01" id="input-edicao-${idCobranca}-${indiceParcela}">
                    <button class="btn-confirmar-edicao" onclick="confirmarEdicaoParcela(${idCobranca}, ${indiceParcela})">✓</button>
                    <button class="btn-cancelar-edicao" onclick="renderizarNotas()">✕</button>
                `;
                
                setTimeout(() => {
                    const input = document.getElementById(`input-edicao-${idCobranca}-${indiceParcela}`);
                    if (input) input.focus();
                }, 50);
            };
        }

        function confirmarEdicaoParcela(idCobranca, indiceParcela) {
            const inputEdicao = document.getElementById(`input-edicao-${idCobranca}-${indiceParcela}`);
            if (!inputEdicao) return;

            const novoValorParcela = parseFloat(inputEdicao.value) || 0;

            if (novoValorParcela <= 0) {
                alert("O valor da parcela deve ser maior que zero.");
                return;
            }

            const tx = db.transaction(["cobrancas"], "readwrite");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (!cobranca) return;
                
                cobranca.valoresParcelas[indiceParcela] = novoValorParcela;
                recalcularTextoDivida(cobranca);
                store.put(cobranca);
            };

            tx.oncomplete = function() {
                renderizarNotas();
            };
        }

        function compartilharWhatsAppPorID(idCobranca) {
            const tx = db.transaction(["cobrancas"], "readonly");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (!cobranca) return;
                
                const pagas = cobranca.historicoParcelas.filter(p => p === true).length;
                const totalParcelas = cobranca.historicoParcelas.length;
                let status = "🔴 Pendente";
                
                if (pagas === totalParcelas) {
                    status = "🟢 Totalmente Pago";
                } else if (pagas > 0) {
                    status = `🟡 Parcial (${pagas} de ${totalParcelas} pagas)`;
                }
                
                let cronogramaDatas = "";
                if (cobranca.datasFuturas && cobranca.datasFuturas.length > 0) {
                    cronogramaDatas = "\n*Vencimentos e Valores:*\n";
                    cobranca.datasFuturas.forEach((dt, idx) => {
                        const sit = cobranca.historicoParcelas[idx] ? "✅ Pago" : "⏳ Pendente";
                        const val = cobranca.valoresParcelas[idx] ? cobranca.valoresParcelas[idx].toFixed(2) : "0.00";
                        cronogramaDatas += `${idx + 1}ª Parc: ${dt} - R$ ${val} (${sit})\n`;
                    });
                }
                
                const infoData = cobranca.dataConta ? `*Data de Início:* ${cobranca.dataConta}\n` : "";
                const mensagemFormatada = `*Cobrança:* ${cobranca.titulo}\n${infoData}\n${cobranca.texto}${cronogramaDatas}\n*Status Atual:* ${status}`;
                const urlZap = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagemFormatada)}`;
                window.open(urlZap, '_blank');
            };
        }

        function prepararEdicaoPorID(idCobranca) {
            const tx = db.transaction(["cobrancas"], "readonly");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (!cobranca) return;
                
                window.idEdicaoAtual = idCobranca;
                document.getElementById("notaTitulo").value = cobranca.titulo;
                document.getElementById("notaValor").value = cobranca.valor;
                document.getElementById("notaParcelas").value = cobranca.historicoParcelas.length;
                document.getElementById("notaTexto").value = cobranca.texto;
                
                if (cobranca.dataRaw) {
                    document.getElementById("notaData").value = cobranca.dataRaw;
                } else {
                    document.getElementById("notaData").value = "";
                }
                
                document.getElementById("btnSalvarPrincipal").innerHTML = "🔄 Atualizar Dados";
                document.getElementById("notaTitulo").focus();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
        }

        function alternarParcela(idCobranca, indiceParcela, valorChecado) {
            const tx = db.transaction(["cobrancas"], "readwrite");
            const store = tx.objectStore("cobrancas");
            const pedidoObter = store.get(idCobranca);

            pedidoObter.onsuccess = function() {
                const cobranca = pedidoObter.result;
                if (cobranca) {
                    cobranca.historicoParcelas[indiceParcela] = valorChecado;
                    recalcularTextoDivida(cobranca);
                    store.put(cobranca);
                }
            };

            tx.oncomplete = function() {
                renderizarNotas();
            };
        }

        function recalcularTextoDivida(cobranca) {
            const totalParcelas = cobranca.historicoParcelas.length;
            
            let totalPago = 0;
            for (let i = 0; i < totalParcelas; i++) {
                if (cobranca.historicoParcelas[i] === true) {
                    totalPago += cobranca.valoresParcelas[i];
                }
            }
            
            const saldoDevedor = Math.max(0, cobranca.valor - totalPago);

            if (totalParcelas === 1) {
                if (saldoDevedor === 0) {
                    cobranca.texto = `Pagamento à vista no valor de R$ ${cobranca.valor.toFixed(2)}.\nStatus: Totalmente Pago.`;
                } else {
                    cobranca.texto = `Pagamento à vista no valor de R$ ${cobranca.valor.toFixed(2)}.`;
                }
            } else {
                cobranca.texto = `Valor Total: R$ ${cobranca.valor.toFixed(2)}\nParcelas ativas: ${totalParcelas}\nJá pago: R$ ${totalPago.toFixed(2)}\nSaldo Restante: R$ ${saldoDevedor.toFixed(2)}`;
            }
        }

        function excluirNota(id) {
            if (confirm("Remover essa cobrança permanentemente?")) {
                const tx = db.transaction(["cobrancas"], "readwrite");
                tx.objectStore("cobrancas").delete(id);
                tx.oncomplete = function() {
                    if(window.idEdicaoAtual === id) limparFormulario();
                    renderizarNotas();
                };
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
